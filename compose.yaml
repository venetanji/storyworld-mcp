services:
  tailscale-serve:
    image: tailscale/tailscale:latest
    hostname: polyu-storyworld
    dns:
      - 100.100.100.100
      - 1.1.1.1
    dns_search:
      - tail9683c.ts.net
    ports:
      - "3334:3334"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
    volumes:
      - ./serve.json:/config/serve.json
      - tailscale-data:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  mcp:
    network_mode: "service:tailscale-serve"
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - characters:/app/characters
      - hf-cache:/root/.cache/huggingface
      - ./tools:/app/tools
      - ${COMFY_OUTPUT_DIR_HOST:-./comfy-output}:/app/comfy-output
      - ${STORIES_DIR_HOST:-./stories}:/app/stories
    environment:
      - PYTHONPATH=/app/src
      - HF_HOME=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN}
      - FASTMCP_TOOLS_RELOAD=${FASTMCP_TOOLS_RELOAD:-0}
      - COMFY_OUTPUT_DIR=/app/comfy-output
      - STORIES_DIR=/app/stories

volumes:
  hf-cache:
    driver: local
  tailscale-data:
    driver: local
  characters:
    driver: local
